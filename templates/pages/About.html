<p>2010年5月に「世界時計 - 世界の時間と時差」のウェブページを公開しました。2010年8月には「気温と雨量の統計」の旧版を公開し、その後、2011年5月にサブドメイン weather.time-j.net として内容を充実させて公開しました。今では、多くの方々に利用していただけるようになっています。今後も、世界の国及び都市の時間、天気その他の統計情報を正確でわかりやすく提供するサイトを構築していきたいと思っています。</p>
